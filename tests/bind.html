<style>
  #green {
    color: green;
  }
  .red {
    color: red;
  }
  .orange {
    color: orange;
  }
  .static {
    font-weight: bold;
  }
  [v-cloak] {
    opacity: 0;
  }
</style>

<script type="module">
  import { createApp, reactive } from '../src'

  // for testing
  const data = (window.data = reactive({
    id: 'green',
    classes: ['foo', { red: true }],
    style: { color: 'blue' },
    obj: {
      class: 'orange'
    },
    btnDisabled: true,
    counter: 0
  }))

  createApp(data).mount()
</script>

<div v-scope v-cloak>
  <div :id="id">simple binding - this should be green</div>
  <div class="static" :class="classes">
    class binding - this should be red and bold
  </div>
  <div style="font-weight: bold" :style="style">
    style binding - this should be blue and bold
  </div>
  <div v-bind="obj">object binding - this should be orange</div>

  <!-- v-bind object with class + static class: static must be preserved on updates -->
  <div class="static" v-bind="{ class: 'orange' }">
    v-bind object class + static - this should be orange and bold
  </div>

  <!-- :class array + :disabled: no static class, classes must not duplicate on toggle -->
  <div>
    <button
      type="button"
      :class="['btn', { disabled: btnDisabled }]"
      :disabled="btnDisabled"
    >
      Toggle (disabled state should not accumulate classes)
    </button>
    <button @click="btnDisabled = !btnDisabled">Toggle disabled</button>
  </div>

  <!-- :class + :disabled with counter to cycle -->
  <div>
    <h1 class="static" v-bind="{ class: counter % 2 === 0 ? 'even' : 'odd' }">v-bind (static must stay bold)</h1>
    <h1 class="static" :class="counter % 2 === 0 ? 'even' : 'odd'">:class (static must stay bold)</h1>
    <button @click="counter++">Increment counter ({{ counter }})</button>
  </div>
</div>
